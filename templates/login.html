{% extends "base.html" %}

{% block content %}

<h2>Login</h2>

<form method="POST">

<input type="text"
name="username"
class="form-control mb-3"
placeholder="Username">

<input type="password"
name="password"
class="form-control mb-3"
placeholder="Password">

<button class="btn btn-primary">
Login
</button>

<a href="/register">
Register
</a>

</form>

{% endblock %}
